name: Publish Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      PUBLISH_DIR: dist
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm
        run: |
          corepack enable
          pnpm config set store-dir "$RUNNER_TEMP/pnpm-store"

      - name: Install dependencies
        env:
          PNPM_CONFIG_DANGEROUSLY_ALLOW_ALL_BUILDS: true
        run: pnpm install --frozen-lockfile

      - name: Build
        env:
          GITHUB_PAGES_BASE: /product-h5-game-radon-games/
        run: pnpm run build

      - name: Prepare SPA fallback
        run: cp dist/index.html dist/404.html

      - name: Publish to gh-pages
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          test -f "$PUBLISH_DIR/index.html"
          site="$(mktemp -d)"
          rsync -a --delete "$PUBLISH_DIR"/ "$site"/
          find "$site" -name '.DS_Store' -delete
          touch "$site/.nojekyll"

          cd "$site"
          git init -q
          git checkout -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Publish pages ${GITHUB_SHA::7}"
          git push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages:gh-pages

      - name: Cleanup workspace
        if: always()
        run: |
          rm -rf node_modules dist "$RUNNER_TEMP/pnpm-store" "$HOME/.cache/node/corepack"
